<!DOCTYPE html>
<html lang="en" ng-app="ShoppingListDirectiveApp">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Directives with Isolate Scope</title>
  </head>
  <body>
    <h1>Directives with Isolate Scope</h1>
    <div ng-controller="ShoppingListController1 as list1">
      <input
        type="text"
        ng-model="list1.itemName"
        placeholder="item name"
      />
      <input
        type="text"
        ng-model="list1.itemQuantity"
        placeholder="quantity"
      />
      <button ng-click="list1.addItem();">Add Item</button>

      <shopping-list
        my-list="list1"
        title="{{list1.title}}"
      ></shopping-list>

      <div ng-if="list1.errorMessage">
        Error: {{list1.errorMessage}}
      </div>
    </div>
    <div ng-controller="ShoppingListController2 as list2">
      <input
        type="text"
        ng-model="list2.itemName"
        placeholder="item name"
      />
      <input
        type="text"
        ng-model="list2.itemQuantity"
        placeholder="quantity"
      />
      <button ng-click="list2.addItem();">Add Item</button>

      <shopping-list
        my-list="list2"
        title="{{list2.title}}"
      ></shopping-list>

      <div ng-if="list2.errorMessage">
        Error: {{list2.errorMessage}}
      </div>
    </div>
    <script src="../node_modules/angular/angular.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
