<!DOCTYPE html>
<html lang="en" ng-app="ShoppingList">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Shopping List With Events</title>
  </head>
  <body>
    <h1>Shopping List With Events:</h1>
    <div ng-controller="ShoppingListController as list">
      <input
        type="text"
        ng-model="list.itemName"
        placeholder="item name"
      />
      <input
        type="text"
        ng-model="list.itemQuantity"
        placeholder="quantity"
      />
      <button ng-click="list.addItem();">Add Item</button>
      <span>{{ list.lastRemoved }}</span>

      <shopping-list
        items="list.items"
        title="{{list.title}}"
        on-remove="list.removeItem(index)"
      ></shopping-list>
    </div>

    <!-- Libraries -->
    <script src="../node_modules/jquery/dist/jquery.js"></script>
    <script src="../node_modules/angular/angular.js"></script>

    <!-- Modules -->
    <script src="./src/shoppinglist/shoppinglist.module.js"></script>
    <script src="./src/spinner/spinner.module.js"></script>

    <!-- ShoppingList module artifacts -->
    <script src="./src/shoppinglist/shoppinglist.component.js"></script>
    <script src="./src/shoppinglist/shoppinglist.controller.js"></script>
    <script src="./src/shoppinglist/shoppinglist.factory.js"></script>
    <script src="./src/shoppinglist/weightlossfilter.service.js"></script>

    <!-- Spinner module artifacts -->
    <script src="./src/spinner/loadingspinner.component.js"></script>
  </body>
</html>
