<!DOCTYPE html>
<html lang="en" ng-app="ShoppingListDirectiveApp">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Template Expanding Directive</title>
  </head>
  <body>
    <h1>Template Expanding Directive</h1>
    <div id="list1" ng-controller="ShoppingListController1 as list">
      <h3>Shopping List #1</h3>
      <input
        type="text"
        ng-model="list.itemName"
        placeholder="item name"
      />
      <input
        type="text"
        ng-model="list.itemQuantity"
        placeholder="quantity"
      />
      <button ng-click="list.addItem();">Add Item</button>
      <ol>
        <list-item ng-repeat="item in list.items"></list-item>
      </ol>
      <div ng-if="list.errorMessage" class="error">
        Error: {{list.errorMessage }}
      </div>
    </div>
    <div ng-controller="ShoppingListController2 as list">
      <h3>Shopping List #2 (limited to 3 items)</h3>
      <input
        type="text"
        ng-model="list.itemName"
        placeholder="item name"
      />
      <input
        type="text"
        ng-model="list.itemQuantity"
        placeholder="quantity"
      />
      <button ng-click="list.addItem();">Add Item</button>
      <ol>
        <list-item ng-repeat="item in list.items"></list-item>
      </ol>
      <div ng-if="list.errorMessage" class="error">
        Error: {{list.errorMessage }}
      </div>
    </div>
    <script src="../node_modules/angular/angular.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
