<!DOCTYPE html>
<html lang="en" ng-app="ShoppingListDirectiveApp">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Directives with Transclude</title>
  </head>
  <body>
    <h1>Directives with Transclude</h1>

    <div ng-controller="ShoppingListController as list">
      <input
        type="text"
        ng-model="list.itemName"
        placeholder="item name"
      />
      <input
        type="text"
        ng-model="list.itemQuantity"
        placeholder="quantity"
      />
      <button ng-click="list.addItem();">Add Item</button>
      <span>{{list.lastRemoved}}</span>

      <shopping-list
        id="list1"
        items="list.items"
        title="{{list.title}}"
        on-remove="list.removeItem(index)"
      >
        <span class="warning"
          >WARNING! WARNING! {{list.warning}}</span
        >
      </shopping-list>
    </div>
    <script src="../node_modules/jquery/dist/jquery.js"></script>
    <script src="../node_modules/angular/angular.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
