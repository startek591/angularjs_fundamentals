<!DOCTYPE html>
<html lang="en" ng-app="ControllerAsApp">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Custom Service Through a Factory</title>
  </head>
  <body>
    <h1>Custom Service Through a Factory</h1>
    <div id="list1" ng-controller="ShoppingListController1 as list1">
      <h3>Shopping List #1</h3>
      <input
        type="text"
        ng-model="list1.itemName"
        placeholder="item name"
      />
      <input
        type="text"
        ng-model="list1.itemQuantity"
        placeholder="quantity"
      />
      <button ng-click="list1.addItem();">Add Item</button>
      <ol>
        <li ng-repeat="item in list1.items">
          {{item.quantity}} of {{item.name}}
          <button ng-click="list1.removeItem($index);">
            Remove Item
          </button>
        </li>
      </ol>
      <div class="error">Error: {{list1.errorMessage}}</div>
    </div>

    <div id="list2" ng-controller="ShoppingListController2 as list2">
      <h3>Shopping List #2 (limited tp 3 items)</h3>
      <input
        type="text"
        ng-model="list2.itemName"
        placeholder="item name"
      />
      <input
        type="text"
        ng-model="list2.itemQuantity"
        placeholder="quantity"
      />
      <button ng-click="list2.addItem();">Add Item</button>
      <ol>
        <li ng-repeat="item in list2.items">
          {{item.quantity}} of {{ item.name}}
          <button ng-click="list2.removeItem($index);">
            Remove Item
          </button>
        </li>
      </ol>
      <div class="error">Error: {{list2.errorMessage}}</div>
    </div>
    <script src="../node_modules/angular/angular.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
