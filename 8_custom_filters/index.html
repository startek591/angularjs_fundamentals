<!DOCTYPE html>
<html lang="en" ng-app="MsgApp">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Custom Filters</title>
  </head>
  <body>
    <div ng-controller="MsgController">
      Original: {{ sayMessage()}} <br />
      Loves: {{ sayLovesMessage() }} <br />
      Truth : {{ sayLovesMessage() | truth: 'healthy': 'cookie'}} BIG
      TRUTH: {{ sayLovesMessage() | truth: 'healthy': 'cookie' |
      uppercase }}
      <br />
    </div>
    <script src="../node_modules/angular/angular.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
